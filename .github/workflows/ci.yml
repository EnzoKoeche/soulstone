name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root tooling
        run: npm install

      - name: Lint (Biome)
        run: npm run lint

      - name: Unit tests (parser + steam)
        run: npm test

      - name: Build frontend
        run: |
          npm install --prefix web
          npm run build --prefix web
